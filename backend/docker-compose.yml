version: "3.9"

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: adversaria
      POSTGRES_PASSWORD: adversaria
      POSTGRES_DB: adversaria_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U adversaria"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Qdrant ──────────────────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.12.4
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333
      QDRANT__SERVICE__GRPC_PORT: 6334

  # ── MinIO (S3-compatible) ───────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO bucket creation (one-shot init) ───────────────────────────────────
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin;
        mc mb --ignore-existing local/adversaria-assets;
        mc anonymous set public local/adversaria-assets;
      "

  # ── FastAPI backend ─────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn adversaria.main:app --host 0.0.0.0 --port 8000 --reload
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://adversaria:adversaria@postgres:5432/adversaria_db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      QDRANT_URL: http://qdrant:6333
      S3_ENDPOINT_URL: http://minio:9000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    restart: unless-stopped

  # ── Celery worker ───────────────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A adversaria.workers.celery_app.celery_app worker --loglevel=info --concurrency=2
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://adversaria:adversaria@postgres:5432/adversaria_db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      QDRANT_URL: http://qdrant:6333
      S3_ENDPOINT_URL: http://minio:9000
    depends_on:
      - redis
      - postgres
    volumes:
      - .:/app
    restart: unless-stopped

  # ── Celery Flower (monitoring) ──────────────────────────────────────────────
  flower:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A adversaria.workers.celery_app.celery_app flower --port=5555
    env_file: .env
    environment:
      CELERY_BROKER_URL: redis://redis:6379/1
    ports:
      - "5555:5555"
    depends_on:
      - redis

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  minio_data:
